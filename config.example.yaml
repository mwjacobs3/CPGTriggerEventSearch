# ── Email alerts ──────────────────────────────────────────────────────────────
# Credentials are injected from environment variables at runtime.
# Set these in your .env or GitHub Actions Secrets.
alerts:
  email:
    enabled: true
    smtp_host: ""       # overridden by SMTP_HOST env var
    smtp_port: 587      # overridden by SMTP_PORT env var
    sender_email: ""    # overridden by EMAIL_SENDER env var
    sender_password: "" # overridden by EMAIL_PASSWORD env var
    recipient_emails: []# overridden by EMAIL_RECIPIENTS env var (comma-separated)
