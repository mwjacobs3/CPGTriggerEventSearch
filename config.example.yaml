# CPGTriggerEventSearch — configuration
# Copy this file to config.yaml before running.
# Secrets (Supabase keys, email credentials) stay in environment variables
# or GitHub Actions Secrets — never commit them here.

# ── Scraper settings ──────────────────────────────────────────────────────────
scraper:
  max_age_hours: 0                  # 0 = no age filter (recommended while building DB); set e.g. 72 to limit
  check_interval_minutes: 240       # Daemon mode only (GitHub Actions uses cron)
  request_delay: 1.5                # Seconds between HTTP requests
  timeout: 30
  user_agent: "Mozilla/5.0 (compatible; CPGTriggerEventSearch/2.0)"

# ── Territory / ICP filters ───────────────────────────────────────────────────
# DOSS target: mid-market ($5M–$100M) US-based CPG companies.
territory:
  country: "United States"

  # Drop articles that are clearly about non-US companies
  excluded_locations:
    - "united kingdom"
    - " uk "
    - "australia"
    - " canada"
    - "india"
    - "germany"
    - "france"
    - "china"
    - "japan"
    - "mexico"
    - "brazil"
    - "europe"
    - "asia pacific"
    - "middle east"

  company_filters:
    exclude_public_companies: true

    # Text patterns that indicate a publicly traded company
    public_company_indicators:
      - "nasdaq:"
      - "(nasdaq"
      - "nyse:"
      - "(nyse"
      - "otcbb:"
      - "s&p 500"
      - "fortune 500"
      - "fortune 100"

    # Mega CPG manufacturers — filtered if mentioned anywhere (too large for DOSS).
    excluded_public_companies:
      - "nestle"
      - "unilever"
      - "procter & gamble"
      - " p&g "
      - "colgate"
      - "l'oreal"
      - "loreal"
      - "johnson & johnson"
      - "kimberly-clark"
      - "general mills"
      - "kraft heinz"
      - "campbell soup"
      - "conagra"
      - "hershey"
      - "mondelez"
      - "pepsico"
      - "coca-cola"
      - "coca cola"
      - "mars inc"
      - "kellogg"
      - "kellanova"
      - "post holdings"
      - "treehouse foods"
      - "sysco"
      - "us foods"
      - "reckitt"
      - "church & dwight"
      - "clorox"
      - "anheuser-busch"
      - "ab inbev"
      - "molson coors"
      - "constellation brands"
      - "keurig dr pepper"
      - "tyson foods"
      - "hormel"
      - "estee lauder"
      - "coty inc"
      - "haleon"
      - "kenvue"

    # Major retailers / corporations — filtered ONLY when they are the
    # SUBJECT of the article. A mid-market CPG brand *entering* these
    # retailers (Meijer, Target, Whole Foods, Container Store, etc.) is
    # exactly the signal we want, so we don't want to blanket-exclude.
    excluded_mega_subjects:
      # Grocery / mass
      - "walmart"
      - "amazon"
      - "target corporation"
      - "kroger"
      - "costco"
      - "albertsons"
      - "dollar general"
      - "meijer"
      - "publix"
      - "wegmans"
      - "h-e-b"
      - "whole foods"
      - "trader joe"
      - "sprouts farmers market"
      - "aldi"
      # Drug / convenience
      - "cvs"
      - "walgreens"
      - "rite aid"
      - "7-eleven"
      # Big-box / specialty
      - "home depot"
      - "lowe's"
      - "best buy"
      - "macy's"
      - "nordstrom"
      - "kohl's"
      - "tj maxx"
      - "marshalls"
      - "dick's sporting goods"
      - "tractor supply"
      - "bed bath"
      - "the container store"
      - "container store"
      - "williams-sonoma"
      - "ulta beauty"
      - "sephora"
      - "petsmart"
      - "petco"
      - "sam's club"
      - "bj's wholesale"
      # QSR / foodservice
      - "starbucks"
      - "mcdonald's"
      - "chipotle"
      - "dunkin"
      - "chick-fil-a"
      # Media / tech / entertainment
      - "espn"
      - "the walt disney"
      - "disney+"
      - "warner bros"
      - "nbcuniversal"
      - "paramount global"
      - "fox corporation"
      - "comcast"
      - "netflix"
      - "spotify"
      # Airlines / hotels / telecom (not DOSS ICP)
      - "united airlines"
      - "delta air lines"
      - "marriott"
      - "hilton worldwide"
      - "verizon"
      - "at&t"
      - "t-mobile"

    # Positive signals that a company is in the right size band
    target_size_indicators:
      - "series a"
      - "series b"
      - "seed round"
      - "bootstrap"
      - "emerging brand"
      - "startup"
      - "dtc"
      - "direct-to-consumer"
      - "challenger brand"
      - "growing brand"
      - "independent brand"
      - "family-owned"
      - "founder-led"

# ── Event classification keywords ─────────────────────────────────────────────
keywords:
  product_launch:
