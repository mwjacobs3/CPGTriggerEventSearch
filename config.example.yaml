    - "rolls out"

  retail_expansion:
    - "enters retail"
    - "retail launch"
    - "launches in stores"
    - "available at"
    - "distribution agreement"
    - "distribution deal"
    - "national distribution"
    - "wholesale"
    - "brick and mortar"
    - "whole foods"
    - "target stores"
    - "walmart"
    - "costco"
    - "kroger"
    - "sprouts"
