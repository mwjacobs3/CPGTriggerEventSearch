    - "vp operations"
    - "vice president operations"
    - "vp logistics"
    - "vp procurement"
    - "vp fulfillment"
    - "chief supply chain"
    - "chief operations"
    - "chief operating"
    - "coo"
    - "csco"
    - "director supply chain"
    - "director of operations"
    - "director logistics"
    - "director procurement"
    - "director of fulfillment"
    - "head of supply chain"
    - "head of operations"
    - "head of fulfillment"
    - "head of procurement"
    - "svp supply chain"
    - "svp operations"
    # Founder-led CPG brands (founder IS the ops buyer at sub-$50M)
    - "founder and ceo"
    - "founder & ceo"
    - "founder/ceo"
    - "co-founder and ceo"
    - "co-founder & ceo"
    - "president and ceo"
    - "founder of"
    - "co-founder of"
